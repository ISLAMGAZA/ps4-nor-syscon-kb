name: Aggregate corpus

on:
  push:
    branches: [main]
    paths:
      - "community/corpus/**"
      - "scripts/aggregate.py"
  pull_request:
    paths:
      - "community/corpus/**"
      - "scripts/aggregate.py"

permissions:
  contents: write

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Aggregate anonymized reports
        run: python scripts/aggregate.py --json
      - name: Commit updated stats
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add community/stats.json
          git diff --cached --quiet || git commit -m "chore: regenerate corpus stats"
          git push
