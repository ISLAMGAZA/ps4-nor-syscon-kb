name: Bug report
description: Report a problem with the tool or the knowledge base.
labels: ["bug"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - "GUI app"
        - "Console tool"
        - "Knowledge base / docs"
        - "Corpus / stats"
        - "Other"
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Steps to reproduce + expected vs actual behaviour.
    validations:
      required: true
  - type: input
    id: model
    attributes:
      label: Console model / FW (optional — do NOT paste serials)
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy
      options:
        - label: "I did not include any serial / MAC / board-id."
          required: true
